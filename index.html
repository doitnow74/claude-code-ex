<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>2048</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: "Segoe UI", sans-serif;
    background: #faf8ef;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 40px;
  }
  h1 { font-size: 60px; color: #776e65; margin: 0; }
  .top-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 16px 0;
  }
  .score-box {
    background: #bbada0;
    color: #fff;
    border-radius: 6px;
    padding: 8px 20px;
    text-align: center;
    min-width: 80px;
  }
  .score-box .label { font-size: 13px; text-transform: uppercase; }
  .score-box .value { font-size: 22px; font-weight: bold; }
  #new-game {
    background: #8f7a66;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 10px 18px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
  }
  #new-game:hover { background: #9f8b76; }
  #board {
    position: relative;
    background: #bbada0;
    border-radius: 8px;
    padding: 10px;
    display: grid;
    grid-template-columns: repeat(4, 100px);
    grid-template-rows: repeat(4, 100px);
    gap: 10px;
  }
  .cell {
    background: rgba(238, 228, 218, 0.35);
    border-radius: 6px;
  }
  .tile {
    position: absolute;
    width: 100px;
    height: 100px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: bold;
    color: #776e65;
    background: #eee4da;
    transition: top 0.12s ease, left 0.12s ease;
  }
  .tile-2    { background: #eee4da; }
  .tile-4    { background: #ede0c8; }
  .tile-8    { background: #f2b179; color: #f9f6f2; }
  .tile-16   { background: #f59563; color: #f9f6f2; }
  .tile-32   { background: #f67c5f; color: #f9f6f2; }
  .tile-64   { background: #f65e3b; color: #f9f6f2; }
  .tile-128  { background: #edcf72; color: #f9f6f2; font-size: 32px; }
  .tile-256  { background: #edcc61; color: #f9f6f2; font-size: 32px; }
  .tile-512  { background: #edc850; color: #f9f6f2; font-size: 32px; }
  .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 28px; }
  .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 28px; }
  #message {
    margin-top: 16px;
    font-size: 20px;
    color: #776e65;
    height: 28px;
    font-weight: bold;
  }
  #hint { margin-top: 8px; color: #999; font-size: 13px; }
</style>
</head>
<body>
  <h1>2048</h1>
  <div class="top-bar">
    <div class="score-box">
      <div class="label">점수</div>
      <div class="value" id="score">0</div>
    </div>
    <div class="score-box">
      <div class="label">최고 점수</div>
      <div class="value" id="best">0</div>
    </div>
    <button id="new-game">새 게임</button>
  </div>
  <div id="board"></div>
  <div id="message"></div>
  <div id="hint">방향키로 타일을 밀어서 같은 숫자를 합치세요. 2048을 만들면 승리!</div>

<script>
(function () {
  const SIZE = 4;
  const boardEl = document.getElementById('board');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const messageEl = document.getElementById('message');
  const newGameBtn = document.getElementById('new-game');

  let grid, score, best, gameOver, won;

  function init() {
    boardEl.innerHTML = '';
    for (let i = 0; i < SIZE * SIZE; i++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      boardEl.appendChild(cell);
    }
    best = Number(localStorage.getItem('2048-best') || 0);
    bestEl.textContent = best;
    startGame();
  }

  function startGame() {
    grid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
    score = 0;
    gameOver = false;
    won = false;
    messageEl.textContent = '';
    scoreEl.textContent = '0';
    addRandomTile();
    addRandomTile();
    render();
  }

  function addRandomTile() {
    const empty = [];
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (grid[r][c] === 0) empty.push([r, c]);
    if (empty.length === 0) return;
    const [r, c] = empty[Math.floor(Math.random() * empty.length)];
    grid[r][c] = Math.random() < 0.9 ? 2 : 4;
  }

  function render() {
    boardEl.querySelectorAll('.tile').forEach(t => t.remove());
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const val = grid[r][c];
        if (val === 0) continue;
        const tile = document.createElement('div');
        tile.className = 'tile tile-' + (val > 2048 ? 2048 : val);
        tile.textContent = val;
        tile.style.top = (10 + r * 110) + 'px';
        tile.style.left = (10 + c * 110) + 'px';
        boardEl.appendChild(tile);
      }
    }
    scoreEl.textContent = score;
    if (score > best) {
      best = score;
      bestEl.textContent = best;
      localStorage.setItem('2048-best', best);
    }
  }

  function slideRowLeft(row) {
    const nums = row.filter(v => v !== 0);
    const result = [];
    let moved = false;
    let gained = 0;
    for (let i = 0; i < nums.length; i++) {
      if (i < nums.length - 1 && nums[i] === nums[i + 1]) {
        const merged = nums[i] * 2;
        result.push(merged);
        gained += merged;
        i++;
        moved = true;
      } else {
        result.push(nums[i]);
      }
    }
    while (result.length < SIZE) result.push(0);
    for (let i = 0; i < SIZE; i++) {
      if (result[i] !== row[i]) moved = true;
    }
    return { row: result, moved, gained };
  }

  function rotateGrid(g) {
    const newGrid = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        newGrid[c][SIZE - 1 - r] = g[r][c];
    return newGrid;
  }

  function move(direction) {
    if (gameOver) return;
    let rotations;
    if (direction === 'left') rotations = 0;
    else if (direction === 'up') rotations = 3;
    else if (direction === 'right') rotations = 2;
    else if (direction === 'down') rotations = 1;

    let g = grid;
    for (let i = 0; i < rotations; i++) g = rotateGrid(g);

    let moved = false;
    let gainedTotal = 0;
    const newG = [];
    for (let r = 0; r < SIZE; r++) {
      const { row, moved: m, gained } = slideRowLeft(g[r]);
      newG.push(row);
      if (m) moved = true;
      gainedTotal += gained;
    }

    let result = newG;
    for (let i = 0; i < (4 - rotations) % 4; i++) result = rotateGrid(result);

    if (moved) {
      grid = result;
      score += gainedTotal;
      addRandomTile();
      render();
      checkGameState();
    }
  }

  function checkGameState() {
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (grid[r][c] >= 2048 && !won) {
          won = true;
          messageEl.textContent = '🎉 2048 달성! 계속 플레이할 수 있습니다.';
        }

    const hasEmpty = grid.some(row => row.includes(0));
    if (hasEmpty) return;

    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const v = grid[r][c];
        if (c < SIZE - 1 && v === grid[r][c + 1]) return;
        if (r < SIZE - 1 && v === grid[r + 1][c]) return;
      }
    }

    gameOver = true;
    messageEl.textContent = '게임 종료! 더 이상 움직일 수 없습니다.';
  }

  document.addEventListener('keydown', e => {
    const map = {
      ArrowLeft: 'left',
      ArrowRight: 'right',
      ArrowUp: 'up',
      ArrowDown: 'down'
    };
    if (map[e.key]) {
      e.preventDefault();
      move(map[e.key]);
    }
  });

  newGameBtn.addEventListener('click', startGame);

  init();
})();
</script>
</body>
</html>
